<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>울릉도 서면 태하마을 & 은혜농장</title>
    <style>
        /* 기본 스타일 리셋 및 설정 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f9f9f9;
        }
        a {
            text-decoration: none;
            color: inherit;
        }

        /* 레이아웃 컨테이너 */
        .container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 섹션 공통 스타일 */
        section {
            background: #fff;
            margin-bottom: 20px;
            padding: 25px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }
        h2 {
            font-size: 1.4rem;
            margin-bottom: 15px;
            color: #111;
            border-bottom: 2px solid #333;
            padding-bottom: 5px;
        }

        /* 첫 화면 (히어로 섹션) */
        .hero {
            text-align: center;
            background: #f0f4f8;
            padding: 40px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #d0d7de;
        }
        .hero h1 {
            font-size: 1.8rem;
            color: #000;
            margin-bottom: 10px;
            word-break: keep-all;
        }
        .hero .sub-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #444;
            margin-bottom: 10px;
            word-break: keep-all;
        }
        .hero p {
            font-size: 1rem;
            color: #666;
            margin-bottom: 20px;
            word-break: keep-all;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .btn {
            display: inline-block;
            background: #333;
            color: #fff;
            padding: 12px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            text-align: center;
        }
        .btn:hover {
            background: #555;
        }

        /* 이미지 컨테이너 공간 */
        .image-container {
            width: 100%;
            background: #e2e8f0;
            border-radius: 8px;
            margin-bottom: 20px;
            overflow: hidden;
            border: 1px solid #cbd5e1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .image-container svg {
            display: block;
            width: 100%;
            height: auto;
        }

        /* 소개 카드 세션 */
        .cards {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }
        .card {
            background: #f8fafc;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
        }
        .card h3 {
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: #222;
        }

        /* 방문 안내 세션 */
        .info-list {
            list-style: none;
        }
        .info-list li {
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #edf2f7;
        }
        .info-list li:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .info-list strong {
            display: inline-block;
            width: 100px;
            color: #4a5568;
        }

        /* 영어 안내 */
        .english-section p {
            font-size: 0.95rem;
            color: #2d3748;
            margin-bottom: 10px;
            padding-left: 10px;
            border-left: 3px solid #cbd5e1;
        }
        .english-section p:last-child {
            margin-bottom: 0;
        }

        /* FAQ 스타일 */
        .faq-item {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #edf2f7;
        }
        .faq-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .faq-q {
            font-weight: bold;
            color: #1a202c;
            margin-bottom: 5px;
        }
        .faq-a {
            color: #4a5568;
            padding-left: 5px;
        }

        /* 문의 섹션 */
        .contact-section {
            text-align: center;
            background: #f1f5f9;
        }
        .contact-phone {
            font-size: 1.3rem;
            font-weight: bold;
            color: #000;
            margin: 10px 0 20px 0;
            display: block;
        }

        /* 반응형 디자인 (화면이 넓어질 때) */
        @media (min-width: 600px) {
            .btn-group {
                flex-direction: row;
                justify-content: center;
                gap: 15px;
            }
            .btn {
                padding: 12px 30px;
            }
            .cards {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>

    <header class="hero">
        <h1>울릉도 서면 태하마을 & 은혜농장</h1>
        <div class="sub-title">산과 바다가 한눈에! 나물 향 가득한 공간</div>
        <p>태하마을에서 차로 5분 거리, 푸른 바다와 초록빛 산이 주는 쉼표를 느껴보세요.</p>

        </div>
    </header>
