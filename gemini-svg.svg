<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- 하늘과 부드러운 노을빛 배경 -->
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#bae6fd" />
      <stop offset="40%" stop-color="#e0f2fe" />
      <stop offset="80%" stop-color="#ffedd5" />
      <stop offset="100%" stop-color="#fef08a" />
    </linearGradient>
    <!-- 바다 그라데이션 -->
    <linearGradient id="seaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" />
      <stop offset="30%" stop-color="#0369a1" />
      <stop offset="100%" stop-color="#075985" />
    </linearGradient>
    <!-- 해안 절벽 그라데이션 -->
    <linearGradient id="cliffGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#78716c" />
      <stop offset="100%" stop-color="#4c4643" />
    </linearGradient>
    <!-- 산 그라데이션 -->
    <linearGradient id="mountainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#16a34a" />
      <stop offset="100%" stop-color="#14532d" />
    </linearGradient>
  </defs>

  <!-- 배경 하늘 -->
  <rect width="800" height="280" fill="url(#skyGrad)" />

  <!-- 멀리 보이는 수평선과 바다 -->
  <rect y="240" width="800" height="210" fill="url(#seaGrad)" />

  <!-- 은은한 파도 라인 -->
  <path d="M0 260 Q 200 250, 400 260 T 800 260" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.4" />
  <path d="M0 300 Q 250 290, 500 305 T 800 295" fill="none" stroke="#0ea5e9" stroke-width="2" opacity="0.3" />

  <!-- 태하마을의 울창한 산자락 (좌측 배경) -->
  <path d="M-50 240 Q 100 120, 250 180 T 500 240" fill="url(#mountainGrad)" />
  <path d="M150 240 Q 300 140, 450 170 T 700 240" fill="#15803d" opacity="0.7" />

  <!-- 기암괴석 해안 절벽 (우측 전경) -->
  <path d="M550 450 L 520 320 Q 550 280, 580 250 Q 630 150, 680 180 L 850 300 L 850 450 Z" fill="url(#cliffGrad)" />
  <!-- 절벽의 입체감을 주는 음영 라인 -->
  <path d="M580 250 L 620 340 L 660 450" fill="none" stroke="#2e2a28" stroke-width="3" />
  <path d="M680 180 L 720 280 L 750 450" fill="none" stroke="#2e2a28" stroke-width="4" />

  <!-- 절벽 위 초록빛 숲 요소 (향목령 원시림 표현) -->
  <path d="M570 250 Q 600 230, 630 240 Q 660 170, 680 180 Q 730 190, 780 230 L 800 250 L 800 450 Z" fill="#166534" opacity="0.8" />

  <!-- 태하 해안 둘레길 산책로 교량 표현 (하단 좌측) -->
  <path d="M-10 420 Q 120 390, 260 410 T 450 430" fill="none" stroke="#e2e8f0" stroke-width="8" stroke-linecap="round" />
  <path d="M-10 420 Q 120 390, 260 410 T 450 430" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4,4" />
  <!-- 교량 교각 -->
  <line x1="100" y1="405" x2="100" y2="450" stroke="#64748b" stroke-width="6" />
  <line x1="250" y1="410" x2="250" y2="450" stroke="#64748b" stroke-width="6" />
  <line x1="380" y1="422" x2="380" y2="450" stroke="#64748b" stroke-width="6" />

  <!-- 붉은색 태하 모노레일 (산뜻한 포인트 요소) -->
  <g transform="translate(180, 110) rotate(12)">
    <!-- 모노레일 레일선 -->
    <line x1="-150" y1="50" x2="200" y2="50" stroke="#475569" stroke-width="3" />
    <line x1="-150" y1="53" x2="200" y2="53" stroke="#94a3b8" stroke-width="1" />
    
    <!-- 모노레일 차량 기체 -->
    <rect x="0" y="15" width="70" height="32" rx="6" fill="#dc2626" />
    <rect x="5" y="20" width="18" height="15" rx="2" fill="#e0f2fe" />
    <rect x="26" y="20" width="18" height="15" rx="2" fill="#e0f2fe" />
    <rect x="47" y="20" width="18" height="15" rx="2" fill="#e0f2fe" />
    <!-- 차량 하단 바퀴 부분 -->
    <rect x="15" y="45" width="12" height="6" fill="#1e293b" />
    <rect x="45" y="45" width="12" height="6" fill="#1e293b" />
  </g>

  <!-- 은혜농장의 정취를 담은 나물 잎사귀 포인트 (우측 하단 코너 전경 배치) -->
  <g transform="translate(40, 330) scale(0.7)" opacity="0.9">
    <path d="M0 80 Q 40 20, 80 60 Q 45 90, 0 80" fill="#22c55e" />
    <path d="M10 90 Q 60 40, 100 90 Q 60 110, 10 90" fill="#15803d" />
    <path d="M-20 110 Q 20 50, 70 120 Q 20 130, -20 110" fill="#4ade80" />
    <!-- 나물 줄기 -->
    <path d="M20 100 Q 40 140, 50 180" fill="none" stroke="#166534" stroke-width="4" stroke-linecap="round" />
  </g>

  <!-- 갈매기 디테일 (자유로운 섬 분위기 연출) -->
  <path d="M 340 80 Q 345 73, 350 80 Q 355 73, 360 80" fill="none" stroke="#475569" stroke-width="2" stroke-linecap="round" />
  <path d="M 380 95 Q 383 90, 387 95 Q 391 90, 395 95" fill="none" stroke="#475569" stroke-width="1.5" stroke-linecap="round" />
  <path d="M 600 70 Q 604 63, 609 70 Q 614 63, 619 70" fill="none" stroke="#475569" stroke-width="2" stroke-linecap="round" />
</svg>
